name: a2_system

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.14.2
  - pip=25.3

  # Data processing
  - pandas=3.0.0
  - numpy=2.4.1
  - openpyxl=3.1.5
  - et_xmlfile=2.0.0

  # Database
  - sqlalchemy=2.0.46
  - pyodbc=5.3.0
  - greenlet=3.3.1

  # Environment variables
  - python-dotenv=1.2.1

  # Time/date helpers
  - python-dateutil=2.9.0.post0
  - python-tzdata=2025.3
  - tzdata=2025c
  - six=1.17.0

  # Testing
  - pytest=9.0.3
  - pytest-cov=7.1.0